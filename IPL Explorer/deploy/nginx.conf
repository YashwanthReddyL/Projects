# /etc/nginx/sites-available/ipl-explorer
# =========================================
# Production Nginx config for IPL Explorer.
# Installed automatically by setup_ec2.sh.
# If you need to update it manually:
#   sudo nano /etc/nginx/sites-available/ipl-explorer
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # accepts any hostname / IP

    # ── React frontend (static files) ─────────────────────────────────────────
    root /opt/ipl-explorer/frontend/dist;
    index index.html;

    # Static assets: JS/CSS chunks — cache 1 year (Vite adds content hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── FastAPI backend ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Pass real client IP to FastAPI (used for logging)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Chatbot calls can take a few seconds — don't time out too early
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout  10s;
    }

    # Health check — no auth, no rate limit
    location = /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # React Router: any path that isn't a file gets index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # ── Client body size ───────────────────────────────────────────────────────
    # Chatbot messages won't be large but set a reasonable limit
    client_max_body_size 1m;
}
