<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Resume Screening System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Resume Screening System</h1>

<div class="container">
    <h2>Upload Resume</h2>

    <input type="file" id="resumeFile">
    <textarea id="jobDesc" placeholder="Paste Job Description here..."></textarea>

    <button onclick="submitForm()">Analyze</button>
</div>

<div class="results" id="results" style="display:none;">
    <h2>Candidate Analysis</h2>

    <div class="card">
        <h3 id="name"></h3>
        <p id="email"></p>

        <div class="score">
            Score: <span id="score"></span>%
        </div>

        <div class="section">
            <h4>Matched Skills</h4>
            <ul id="matched"></ul>
        </div>

        <div class="section">
            <h4>Missing Skills</h4>
            <ul id="missing"></ul>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
